<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZME</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="MCQ revision tool">
    <meta name="keywords" content="Quiz, MCQs, BPSC, Revision">
    <meta name="author" content="Aman Bhaskar">
    <link type="image/png" sizes="16x16" rel="icon" href="res/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/d7b86548bd.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="header">
        <div id="settings-btn-wrap">
            <p id="settings-btn"><i class="fa-solid fa-gears"></i></p>
        </div>
        <div id="brand">
            <span class="brand-quiz">Quiz</span><span class="brand-me">Me</span>
        </div>
        <div id="header-right">
            <button id="theme-toggle" aria-label="Toggle theme">
                <i class="fa-solid fa-moon" id="theme-icon"></i>
            </button>
        </div>
    </div>

    <div id="streakBoard">
        <p id="subject"></p>
        <p id="streak"></p>
    </div>

    <div id="progress-bar-wrap">
        <div id="progress-bar-container">
            <div id="progress-bar"></div>
        </div>
        <span id="progress-label">0/0</span>
    </div>

    <div class="container">
        <div id="quiz-container"></div>
    </div>

    <div id="restart-btn">
        <i class="fa-solid fa-rotate-right"></i> Restart
    </div>

    <div id="github">
        <a href="https://github.com/amanbh2" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
        <a href="https://www.linkedin.com/in/amanbh2/" aria-label="LinkedIn"><i class="fa-brands fa-linkedin"></i></a>
    </div>
    <div id="footer"><p>Crafted by Aman Bhaskar</p></div>

    <script src="script.js"></script>

    <div class="overlay"></div>
    <div id="settings-panel">
        <div class="settings-header">
            <h2><i class="fa-solid fa-chart-bar"></i> Statistics</h2>
            <button class="close-settings">&times;</button>
        </div>
        <div class="settings-content">
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="total-attempts">0</span>
                    <span class="stat-label">Attempted</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value correct-val" id="total-correct">0</span>
                    <span class="stat-label">Correct</span>
                </div>
                <div class="stat-card wide">
                    <span class="stat-label">Success Rate</span>
                    <span class="stat-value accent-val" id="success-rate">0%</span>
                </div>
                <div class="stat-card wide">
                    <span class="stat-label">Last Visited</span>
                    <span class="stat-value muted-val" id="last-visited-date"></span>
                </div>
            </div>
            <button id="reset-stats"><i class="fa-solid fa-trash-can"></i> Reset Statistics</button>
        </div>
    </div>

</body>
</html>
